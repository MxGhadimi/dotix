# ----- Display Settings -----
resolution 2560 1440
use_graphics_for linux,windows

# ----- Timeout -----
timeout 10

# ----- Mouse Support -----
enable_mouse true
mouse_speed 8
mouse_size 16

# ----- Default Selection -----
default_selection NixOS

# ----- Only Manual Entries -----
scanfor manual

# ----- Block Auto-Scanning -----
dont_scan_dirs /EFI,ESP:/EFI/Boot,ESP:/EFI/nixos,ESP:/EFI/systemd,ESP:/EFI/Linux
dont_scan_files shim.efi,grubx64.efi,bootx64.efi,bootmgfw.efi,vmlinuz,bzImage
dont_scan_volumes +

# ----- Theme -----
include themes/rEFInd-minimal-rog/theme.conf

# ============================================
# Boot Entries
# ============================================

# NixOS (Left)
menuentry "NixOS" {
    icon     /EFI/refind/themes/rEFInd-minimal-rog/icons/os_nixos.png
    loader   /EFI/systemd/systemd-bootx64.efi
    graphics on
}

# Windows 11 (Right)
menuentry "Windows 11" {
    icon     /EFI/refind/themes/rEFInd-minimal-rog/icons/os_win.png
    loader   /EFI/Microsoft/Boot/bootmgfw.efi
    graphics on
}

